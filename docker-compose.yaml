services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: piTTHjN53P7HjM170zeK
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6.2-alpine
    restart: always
    ports:
      - '7788:6379'
    volumes:
      - redis-data:/data

  ollama:
    image: ollama/ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    restart: always
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: postgres
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_SCHEMA: public
      DB_POSTGRESDB_PASSWORD: piTTHjN53P7HjM170zeK
      GENERIC_TIMEZONE: "Europe/Warsaw"
      TZ: "Europe/Warsaw"
      WEBHOOK_URL: "https://auto.placki.cloud/"
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - ollama
      - redis
      - qdrant

  embeddings:
    build:
      context: ./embeddings
      dockerfile: Dockerfile
    container_name: embeddings
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - embeddings-data:/app/data
    restart: no

volumes:
  postgres-data:
  n8n-data:
  ollama-data:
  redis-data:
  qdrant-data:
  embeddings-data:
