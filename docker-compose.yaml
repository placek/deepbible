services:
  scripts:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - models-data:/models
      - bibles-data:/bibles
    command: "true"
    restart: no

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
      - models-data:/models
      - bibles-data:/bibles
    command: "uvicorn scripts.api:app --log-level debug --reload --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    restart: always

volumes:
  models-data:
  bibles-data:
